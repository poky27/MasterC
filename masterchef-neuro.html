{n:"Caballa",o:"1.6",pr:"20.0",p:"S/6–10/kg",h:"Bajo",ss:"Oct-Feb",tp:"DHA alto. Sudado o plancha.",cl:"#16A34A"},
{n:"Sardina",o:"1.5",pr:"20.0",p:"S/4–6/lata",h:"Muy bajo",ss:"Enlatada siempre",tp:"Con espinas=calcio. En AOVE.",cl:"#2563EB"},
{n:"Jurel",o:"1.3",pr:"19.5",p:"S/5–8/kg",h:"Bajo",ss:"Todo el año",tp:"Económico. Al horno o plancha.",cl:"#2563EB"},
{n:"Trucha",o:"1.0",pr:"20.5",p:"S/14–20/kg",h:"Bajo",ss:"Todo el año",tp:"Mejor agua dulce. VitD.",cl:"#9333EA"},
{n:"Salmón",o:"2.2",pr:"21.0",p:"S/45–65/kg",h:"Bajo",ss:"Importado",tp:"CARO. Bonito+caballa=igual ω3 por 1/5.",cl:"#EA580C"}
];

const E=[
{tg:"tg-t",tl:"TEXTO-REF",f:"Metaanálisis 2025: dieta mediterránea → HR 0.82 deterioro cognitivo, 0.89 demencia, 0.70 Alzheimer.",sr:"Fekete et al. GeroScience 2025;47(3):3111-30",nt:"23 estudios."},
{tg:"tg-t",tl:"TEXTO-REF",f:"Dieta MIND 12sem: mejoró sueño, depresión, ansiedad vía BDNF.",sr:"Sci Reports 2025 doi:10.1038/s41598-025-91389-y",nt:"n=44."},
{tg:"tg-t",tl:"TEXTO-REF",f:"Pescados peruanos: anchoveta 2.4g, bonito 1.9g, caballa 1.6g ω3/100g.",sr:"A Comer Pescado/PRODUCE",nt:"Valores aprox."},
{tg:"tg-c",tl:"CONSENSO",f:"Nutrientes neuro: ω3, polifenoles, folato, VitE, colina, fibra prebiótica.",sr:"Revisiones 2022-2025",nt:"Patrón>alimento aislado."},
{tg:"tg-t",tl:"TEXTO-REF",f:"Proteína sin ejercicio: efecto trivial en músculo. 1.2-1.6g/kg/día justificable.",sr:"Phillips SM. McMaster 2026",nt:"Ejercicio=driver principal."}
];

let P={};try{P=JSON.parse(localStorage.getItem('mcn2')||'{}')}catch(e){}
let T='recipes',CF='all',SC='all',XR=null;
const sv=()=>localStorage.setItem('mcn2',JSON.stringify(P));
const tg=k=>{P[k]?delete P[k]:P[k]=1;sv();rn();};
const pc=()=>Object.keys(P).length;
const mt2=(r)=>{const h=r.k.filter(k=>P[k]);return{h:h.length,t:r.k.length,p:Math.round(h.length/r.k.length*100)};};
const st=(n)=>'★'.repeat(n)+'☆'.repeat(5-n);
const ac=()=>[...new Set(Object.values(I).map(v=>v.c))];

let LOG=[];try{LOG=JSON.parse(localStorage.getItem('mcn2_log')||'[]')}catch(e){}
let SKL={};try{SKL=JSON.parse(localStorage.getItem('mcn2_xp')||'{}')}catch(e){}
const svLog=()=>localStorage.setItem('mcn2_log',JSON.stringify(LOG));
const svSkl=()=>localStorage.setItem('mcn2_xp',JSON.stringify(SKL));

const logCook=(id)=>{LOG.push({id,ts:Date.now()});svLog();rn();};
const getWeekLog=()=>{const now=Date.now(),w=7*24*60*60*1000;return LOG.filter(e=>now-e.ts<w);};
const getWeekNut=()=>{const wl=getWeekLog();const tot={prot:0,omega3:0,folate:0,vitE:0,choline:0,fiber:0};wl.forEach(e=>{const r=R.find(x=>x.id===e.id);if(r&&r.nut)Object.keys(tot).forEach(k=>tot[k]+=r.nut[k]);});return tot;};
const delLog=(idx)=>{LOG.splice(idx,1);svLog();rn();};

const LEVELS=[{n:"Aprendiz",i:"🥄",xp:0},{n:"Cocinero",i:"🍳",xp:100},{n:"Chef",i:"👨‍🍳",xp:300},{n:"Sous Chef",i:"🔥",xp:600},{n:"Master Chef",i:"⭐",xp:1000}];
const calcXP=()=>{
  let xp=0;const seen=new Set();
  LOG.forEach(e=>{xp+=20;if(!seen.has(e.id)){xp+=50;seen.add(e.id);}});
  const weeks={};LOG.forEach(e=>{const d=new Date(e.ts),w=`${d.getFullYear()}-W${Math.ceil(((d-new Date(d.getFullYear(),0,1))/86400000+new Date(d.getFullYear(),0,1).getDay()+1)/7)}`;weeks[w]=(weeks[w]||0)+1;});
  Object.values(weeks).forEach(c=>{if(c>=3)xp+=30;});
  const wn=getWeekNut(),MT={prot:350,omega3:7,folate:2800,vitE:105,choline:3850,fiber:175};
  Object.keys(MT).forEach(k=>{if(wn[k]>=MT[k])xp+=25;});
  return xp;
};
const getLevel=(xp)=>{let l=0;LEVELS.forEach((lv,i)=>{if(xp>=lv.xp)l=i;});return l;};

const getFishOmega3=(name)=>{const f=F.find(x=>name.toLowerCase().includes(x.n.toLowerCase())||x.n.toLowerCase().includes(name.toLowerCase()));return f?f.o:null;};

function rn(){
  const ts=[{id:'pantry',l:'Despensa',i:'🧊'},{id:'recipes',l:'Recetas',i:'🍲'},{id:'market',l:'Mercado',i:'🛒'},{id:'report',l:'Mi Reporte',i:'📊'},{id:'evidence',l:'Evidencia',i:'🔬'}];
  document.getElementById('tabs').innerHTML=ts.map(t=>`<button class="tb ${T===t.id?'on':''}" onclick="T='${t.id}';XR=null;rn()"><span>${t.i}</span>${t.l}${t.id==='pantry'&&pc()>0?`<span class="bdg">${pc()}</span>`:''}</button>`).join('');
  const xp=calcXP(),lv=getLevel(xp),lvl=LEVELS[lv],nxt=LEVELS[lv+1];
  const pct=nxt?Math.min(100,Math.round((xp-lvl.xp)/(nxt.xp-lvl.xp)*100)):100;
  document.querySelector('.header-sub').innerHTML=`${lvl.i} Nivel ${lv+1} · ${lvl.n} · ${xp} XP`;
  let xpbar=document.getElementById('xpbar');
  if(!xpbar){xpbar=document.createElement('div');xpbar.id='xpbar';xpbar.style.cssText='height:3px;background:#33302a;border-radius:2px;margin:4px 40px 0;overflow:hidden;';document.querySelector('.header-sub').after(xpbar);}
  xpbar.innerHTML=`<div style="height:100%;width:${pct}%;background:var(--gd);border-radius:2px;transition:width .3s"></div>`;
  const c=document.getElementById('cnt');
  ({pantry:rP,recipes:rR,market:rM,report:rRep,evidence:rE})[T](c);
}

function rP(c){
  const p=pc(),rd=R.filter(r=>mt2(r).p===100).length,al=R.filter(r=>{const m=mt2(r);return m.p>=50&&m.p<100;}).length;
  let h=`<div class="cd"><h3>🧊 ¿Qué tienes?</h3><p class="csub">Marca ingredientes. Recetas se ordenan por lo que puedes cocinar.</p></div>`;
  h+=`<div class="sts"><div class="st"><div class="stn" style="color:var(--gold)">${p}</div><div class="stl">ingredientes</div></div><div class="st"><div class="stn" style="color:var(--grn)">${rd}</div><div class="stl">listas</div></div><div class="st"><div class="stn" style="color:var(--ylw)">${al}</div><div class="stl">casi</div></div></div>`;
  h+=`<div class="cb">${['Todas',...ac()].map(x=>`<button class="cbtn ${SC===(x==='Todas'?'all':x)?'on':''}" onclick="SC='${x==='Todas'?'all':x}';rn()">${x}</button>`).join('')}</div>`;
  const g={};Object.entries(I).forEach(([k,v])=>{if(SC!=='all'&&v.c!==SC)return;if(!g[v.c])g[v.c]=[];g[v.c].push({...v,k:k});});
  for(const[cat,its]of Object.entries(g)){
    h+=`<div class="stit">${cat}</div><div class="g2">`;
    its.forEach(ig=>{const hv=!!P[ig.k];h+=`<button class="ib ${hv?'hv':''}" onclick="tg('${ig.k}')"><span class="ic">${ig.i}</span><div style="flex:1;min-width:0"><div class="nm">${ig.n}</div><div class="pr">${ig.p}/${ig.u}</div></div><div class="ck ${hv?'on':''}">${hv?'✓':''}</div></button>`;});
    h+=`</div>`;
  }
  // Smart suggestions
  const suggest=[...R].map(r=>({...r,mx:mt2(r)})).filter(r=>r.mx.p>=50).sort((a,b)=>b.mx.p-a.mx.p||(b.b+b.u)-(a.b+a.u)).slice(0,3);
  if(suggest.length>0){
    h+=`<div class="stit" style="margin-top:12px">🍲 Puedes cocinar</div>`;
    suggest.forEach(r=>{
      const pC=r.mx.p===100?'var(--grn)':'var(--ylw)';
      h+=`<div class="rc ${r.mx.p===100?'rdy':''}" style="margin-bottom:4px"><div class="rh" onclick="T='recipes';XR='${r.id}';rn()"><div style="display:flex;justify-content:space-between;align-items:center"><div style="flex:1"><span class="rct ${r.ct==='cri'?'cr':'md'}">${r.ct==='cri'?'🇵🇪':'🫒'}</span> <span style="font-size:12px;font-weight:600">${r.n}</span><div class="f" style="font-size:9px;color:var(--mt)">🧠${st(r.b)} 💪${st(r.u)} 🥩${r.pr}</div></div><div style="text-align:center"><div class="rpct" style="color:${pC}">${r.mx.p}%</div></div></div></div>`;
      if(r.mx.p===100) h+=`<div style="padding:0 10px 8px"><button class="cook-btn" onclick="event.stopPropagation();logCook('${r.id}')">✅ Cociné esto</button></div>`;
      h+=`</div>`;
    });
  }
  c.innerHTML=h;
}

function rR(c){
  const p=pc();let rs=[...R];
  if(CF==='med')rs=rs.filter(r=>r.ct==='med');else if(CF==='cri')rs=rs.filter(r=>r.ct==='cri');
  rs.sort((a,b)=>mt2(b).p-mt2(a).p);
  const seen=new Set();LOG.forEach(e=>seen.add(e.id));
  let h=`<div class="cb"><button class="cbtn ${CF==='all'?'on':''}" onclick="CF='all';rn()">Todas</button><button class="cbtn ${CF==='med'?'on':''}" onclick="CF='med';rn()">🫒 Mediterránea</button><button class="cbtn ${CF==='cri'?'on':''}" onclick="CF='cri';rn()">🇵🇪 Criolla</button></div>`;
  if(p>0)h+=`<p class="f" style="font-size:10px;color:var(--mt);margin-bottom:6px">Ordenadas por tus ingredientes</p>`;
  rs.forEach(r=>{
    const mx=mt2(r),pC=mx.p===100?'var(--grn)':mx.p>=50?'var(--ylw)':'var(--mt)',cl=r.ct==='cri'?'cr':'md',lb=r.ct==='cri'?'🇵🇪 Criolla':'🫒 Med';
    h+=`<div class="rc ${mx.p===100?'rdy':''}"><div class="rh" onclick="XR=XR==='${r.id}'?null:'${r.id}';rn()"><div style="display:flex;justify-content:space-between;align-items:flex-start;gap:6px"><div style="flex:1"><div style="display:flex;align-items:center;gap:5px;margin-bottom:3px"><span class="rct ${cl}">${lb}</span><span class="f" style="font-size:10px;color:var(--mt)">⏱${r.t}</span></div><h4 style="font-size:13px;font-weight:600;margin-bottom:3px">${r.n}</h4><div class="f" style="font-size:10px;color:var(--mt)">🧠<span class="stars">${st(r.b)}</span> 💪<span class="stars">${st(r.u)}</span> 🥩${r.pr}</div></div>${p>0?`<div style="text-align:center;flex-shrink:0"><div class="rpct" style="color:${pC}">${mx.p}%</div><div class="f" style="font-size:8px;color:var(--mt)">${mx.h}/${mx.t}</div></div>`:''}</div></div>`;
    if(XR===r.id){
      h+=`<div class="rb"><div style="margin-top:8px"><div class="stit" style="margin-top:0">Ingredientes</div><div style="display:flex;flex-wrap:wrap;gap:3px;margin-bottom:10px">`;
      r.k.forEach(k=>{const ig=I[k];if(!ig)return;const hv=!!P[k];const o3=ig.c==='Pescados'?getFishOmega3(ig.n):null;h+=`<span class="ch ${hv?'hv':'nd'}" onclick="tg('${k}')">${hv?'✓':'○'} ${ig.i}${ig.n}${o3?' ω3:'+o3+'g':''} <span style="font-size:8px;color:var(--mt)">${ig.p}</span></span>`;});
      h+=`</div><div class="stit" style="margin-top:0">Preparación</div><p class="f" style="font-size:11px;line-height:1.5;color:var(--t2);margin-bottom:8px">${r.s}</p><div class="nb"><div class="nl">🧠 VALOR NEUROCOGNITIVO</div><p>${r.nr}</p></div>`;
      h+=`<button class="cook-btn" onclick="logCook('${r.id}')">✅ Cociné esto · +${seen.has(r.id)?20:70} XP</button>`;
      h+=`</div></div>`;
    }
    h+=`</div>`;
  });
  c.innerHTML=h;
}

function rM(c){
  const p=pc();
  let h=`<div class="cd"><h3>🛒 Mercado Lima</h3><p class="csub">Precios GMML. Minorista +30-100%. <span class="tg tg-v">[VERIFICAR-FUENTE]</span></p></div>`;
  if(p>0)h+=`<div class="ib2"><p>Mostrando <strong>${Object.keys(I).length-p}</strong> que NO tienes.</p></div>`;
  const g={};Object.entries(I).filter(([k])=>p===0||!P[k]).forEach(([k,v])=>{if(!g[v.c])g[v.c]=[];g[v.c].push({...v,k:k});});
  for(const[cat,its]of Object.entries(g)){
    h+=`<div class="stit">${cat}</div>`;
    its.forEach(ig=>{h+=`<div class="mr"><span class="ic">${ig.i}</span><div style="flex:1"><div class="nm">${ig.n}</div><div class="nr">${ig.r}</div></div><div style="text-align:right;flex-shrink:0"><div class="pc">${ig.p}</div><div class="un">/${ig.u}</div></div><button class="ab" onclick="tg('${ig.k}')">+Tengo</button></div>`;});
  }
  h+=`<div class="cd" style="margin-top:10px"><h4 class="f" style="font-size:12px;color:var(--gold);margin-bottom:4px">💰 Costo semanal</h4><div class="cr"><div class="cc"><div class="l">Básico</div><div class="v" style="color:var(--grn)">S/75-90</div><div class="d">Cubre MIND</div></div><div class="cc"><div class="l">Premium</div><div class="v" style="color:var(--gold)">S/140-160</div><div class="d">+salmón,nueces</div></div></div></div>`;
  c.innerHTML=h;
}

function rRep(c){
  const wl=getWeekLog(),wn=getWeekNut();
  const MT={prot:350,omega3:7,folate:2800,vitE:105,choline:3850,fiber:175};
  const NL={prot:'Proteína',omega3:'Omega-3',folate:'Folato',vitE:'Vit E',choline:'Colina',fiber:'Fibra'};
  const NU={prot:'g',omega3:'g',folate:'µg',vitE:'mg',choline:'mg',fiber:'g'};
  let h=`<div class="cd"><h3>📊 Mi Reporte Semanal</h3><p class="csub">${wl.length} comida${wl.length!==1?'s':''} esta semana</p></div>`;
  h+=`<div class="cd"><h4 class="f" style="font-size:12px;color:var(--gold);margin-bottom:8px">Progreso MIND semanal</h4>`;
  Object.keys(MT).forEach(k=>{
    const pct=Math.min(100,Math.round(wn[k]/MT[k]*100));
    const cl=pct>=80?'var(--grn)':pct>=50?'var(--ylw)':'var(--red)';
    h+=`<div style="margin-bottom:6px"><div class="f" style="display:flex;justify-content:space-between;font-size:10px;margin-bottom:2px"><span style="color:var(--t2)">${NL[k]}</span><span class="m" style="color:${cl}">${Math.round(wn[k]*10)/10}/${MT[k]}${NU[k]} (${pct}%)</span></div><div style="height:6px;background:#33302a;border-radius:3px;overflow:hidden"><div style="height:100%;width:${pct}%;background:${cl};border-radius:3px;transition:width .3s"></div></div></div>`;
  });
  h+=`</div>`;
  h+=`<div class="cr"><div class="cc"><div class="l">💪 Músculo</div><div class="v" style="color:${wn.prot>=MT.prot*.8?'var(--grn)':'var(--ylw)'}">${Math.round(wn.prot)}g</div><div class="d">Meta: ${MT.prot}g/sem</div></div><div class="cc"><div class="l">🧠 Cognición</div><div class="v" style="color:${wn.omega3>=MT.omega3*.8?'var(--grn)':'var(--ylw)'}">${(Math.round(wn.omega3*10)/10)}g</div><div class="d">Meta: ${MT.omega3}g ω3/sem</div></div><div class="cc"><div class="l">🧬 Cerebro</div><div class="v" style="color:${wn.choline>=MT.choline*.8?'var(--grn)':'var(--ylw)'}">${Math.round(wn.choline)}mg</div><div class="d">Colina/sem</div></div></div>`;
  h+=`<div class="stit" style="margin-top:10px">Historial</div>`;
  if(LOG.length===0) h+=`<div class="cd"><p class="f" style="font-size:11px;color:var(--mt)">Aún no has logueado comidas. Cocina una receta y presiona "Cociné esto".</p></div>`;
  else{
    [...LOG].reverse().slice(0,20).forEach((e,i)=>{
      const r=R.find(x=>x.id===e.id);if(!r)return;
      const d=new Date(e.ts).toLocaleDateString('es-PE',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});
      const ridx=LOG.length-1-i;
      h+=`<div class="mr"><span class="ic">${r.ct==='cri'?'🇵🇪':'🫒'}</span><div style="flex:1"><div class="nm">${r.n}</div><div class="nr">${d} · 🥩${r.pr}</div></div><button class="f" style="font-size:9px;color:var(--red);padding:4px" onclick="delLog(${ridx})">✕</button></div>`;
    });
  }
  const xp=calcXP(),lv=getLevel(xp),lvl=LEVELS[lv],nxt=LEVELS[lv+1];
  h+=`<div class="cd" style="margin-top:8px;border-color:var(--gd)"><h4 class="f" style="font-size:12px;color:var(--gold);margin-bottom:6px">${lvl.i} Nivel ${lv+1}: ${lvl.n}</h4><div class="f" style="font-size:11px;color:var(--t2);margin-bottom:6px">${xp} XP${nxt?` · Siguiente: ${nxt.n} (${nxt.xp} XP)`:' · ¡Nivel máximo!'}</div>`;
  h+=`<div class="f" style="font-size:9px;color:var(--mt)">+20 XP por comida · +50 XP receta nueva · +30 XP si 3+/semana · +25 XP meta MIND</div></div>`;
  c.innerHTML=h;
}

function rE(c){
  let h=`<div class="cd"><h3>🔬 Base científica</h3><p class="csub">Cada dato con etiqueta de confiabilidad.</p></div>`;
  E.forEach(ev=>{h+=`<div class="ec"><span class="tg ${ev.tg}">[${ev.tl}]</span><p class="ef">${ev.f}</p><p class="es">📄 ${ev.sr}</p><div class="en">⚠️ ${ev.nt}</div></div>`;});
  h+=`<div class="wb"><p>Ningún alimento previene demencia solo. Es el patrón dietético. No sustituye consejo profesional.</p></div>`;
  c.innerHTML=h;
}

rn();
</script>
